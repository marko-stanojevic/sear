# Example sear playbook — multi-step deployment with reboot.
#
# Use this as a template for creating a playbook via the Admin API.
# POST an equivalent JSON playbook to /admin/playbooks, then assign it to
# a registered client via PUT /admin/clients/{id} with {"playbook_id": "<id>"}.

name: "Install and configure nginx"

jobs:
  install:
    name: "Install packages"
    steps:
      - name: "Update package index"
        run: apt-get update -y
        shell: bash

      - name: "Install nginx"
        run: apt-get install -y nginx
        shell: bash

      - name: "Download config artifact"
        uses: download-artifact
        with:
          name: nginx.conf
          path: /etc/nginx/

      - name: "Enable service"
        run: systemctl enable nginx
        shell: bash

      - name: "Reboot to apply kernel updates"
        uses: reboot

  post-reboot:
    name: "Post-reboot verification"
    steps:
      - name: "Check nginx is running"
        run: |
          systemctl is-active nginx || (systemctl start nginx && systemctl is-active nginx)
        shell: bash
        continue-on-error: false

      - name: "Upload deployment report"
        uses: upload-artifact
        with:
          name: deploy-report.txt
          path: /tmp/deploy-report.txt

      - name: "Verify with environment secret"
        run: |
          echo "Connecting to DB at $DATABASE_HOST with token $API_TOKEN"
        shell: bash
        env:
          DATABASE_HOST: "db.internal"
