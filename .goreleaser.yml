version: 2

project_name: sear

builds:
  - id: sear-daemon
    binary: sear-daemon
    main: ./cmd/sear-daemon
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

  - id: sear-client
    binary: sear-client
    main: ./cmd/sear-client
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: daemon-archive
    ids:
      - sear-daemon
    name_template: >-
      {{ .ProjectName }}-daemon_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: client-archive
    ids:
      - sear-client
    name_template: >-
      {{ .ProjectName }}-client_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
