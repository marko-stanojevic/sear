name: Go Release
description: Publish a GitHub Release with cross-compiled binaries using GoReleaser

inputs:
  github-token:
    description: GitHub token used to create the release
    required: true

outputs:
  version:
    description: Resolved GitVersion majorMinorPatch
    value: ${{ steps.version.outputs.majorMinorPatch }}
  tag:
    description: Resolved release tag prefixed with v
    value: v${{ steps.version.outputs.majorMinorPatch }}
  tag-created:
    description: Whether the git tag was created in this run
    value: ${{ steps.tag.outputs.created }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.0.0
      with:
        versionSpec: '6.0.x'

    - name: Resolve version
      id: version
      uses: gittools/actions/gitversion/execute@v3.0.0
      with:
        useConfigFile: true
        configFilePath: gitversion.yml

    - name: Create and push release tag
      id: tag
      shell: bash
      env:
        TAG: v${{ steps.version.outputs.majorMinorPatch }}
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists."
          echo "created=false" >> "$GITHUB_OUTPUT"
        else
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: v2.14.3
        args: release --clean --skip=publish
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.majorMinorPatch }}
