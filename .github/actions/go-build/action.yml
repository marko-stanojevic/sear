name: Go Build
description: Cross-compile Go binaries for all target platforms

inputs:
  release-type:
    description: "Build type: 'debug' or 'release'"
    required: false
    default: 'debug'

outputs:
  release-version:
    description: The resolved semantic version
    value: ${{ steps.version.outputs.semVer }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Install GitVersion
      uses: gittools/actions/gitversion/setup@v3.0.0
      with:
        versionSpec: '6.0.x'

    - name: Resolve version
      id: version
      uses: gittools/actions/gitversion/execute@v3.0.0
      with:
        useConfigFile: true
        configFilePath: gitversion.yml

    - name: Display GitVersion outputs
      shell: bash
      run: |
        echo "SemVer: ${{ steps.version.outputs.semVer }}"
        echo "FullSemVer: ${{ steps.version.outputs.fullSemVer }}"
        echo "InformationalVersion: ${{ steps.version.outputs.informationalVersion }}"

    - name: Build snapshot (debug)
      if: inputs.release-type == 'debug'
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: v2.14.3
        args: build --snapshot --clean
      env:
        GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.semVer }}

    - name: Build and package (release)
      if: inputs.release-type == 'release'
      uses: goreleaser/goreleaser-action@v7
      with:
        distribution: goreleaser
        version: v2.14.3
        args: release --clean --skip=publish
      env:
        GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.semVer }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ inputs.release-type }}
        path: dist/
        retention-days: 30
