{{template "layout" .}}
{{define "content"}}
<div class="container">
  <div class="meta">
    <span id="counts-bar">Loading…</span>
    <span class="spacer"></span>
    <div class="search-inline">
      <input id="f-query" type="search" name="q" placeholder="Search secrets…" autocomplete="off"
             hx-get="/ui/partials/vault" hx-target="#table-root" hx-trigger="input changed delay:300ms, search">
      <button class="btn-clear btn-muted" onclick="document.getElementById('f-query').value='';htmx.trigger(document.getElementById('f-query'),'search')" title="Clear">✕</button>
    </div>
    <button class="btn-add" onclick="openAdd()">+ Add secret</button>
    <button hx-get="/ui/partials/vault" hx-target="#table-root" hx-include="#f-query">Refresh</button>
  </div>
  <div id="table-root"
       hx-get="/ui/partials/vault"
       hx-trigger="load"
       hx-swap="innerHTML">
    <div class="spinner"></div>
  </div>
</div>

<!-- Add/edit secret modal -->
<div id="modal-bg" class="modal-bg">
  <div class="modal">
    <div class="modal-head"><h2 id="modal-title">Add secret</h2></div>
    <div class="modal-body">
      <div class="form-group"><label>Name</label><input id="modal-name" type="text" placeholder="MY_SECRET" spellcheck="false" autocomplete="off"></div>
      <div class="form-group">
        <label>Value</label>
        <div style="position:relative">
          <input id="modal-value" type="password" placeholder="secret value" spellcheck="false" autocomplete="off" style="padding-right:70px">
          <button onclick="toggleModalVis()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);padding:2px 6px;font-size:.75rem;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e" id="modal-vis-btn">Show</button>
        </div>
      </div>
    </div>
    <div class="modal-err" id="modal-err"></div>
    <div class="modal-actions">
      <button class="btn-muted" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="saveSecret()">Save</button>
    </div>
  </div>
</div>
{{end}}
{{define "scripts"}}
<script>
var _editingName=null;
var _modalVis=false;

function toggleModalVis(){
  var inp=document.getElementById('modal-value');
  _modalVis=!_modalVis;
  inp.type=_modalVis?'text':'password';
  document.getElementById('modal-vis-btn').textContent=_modalVis?'Hide':'Show';
}
function openAdd(){
  _editingName=null;
  document.getElementById('modal-title').textContent='Add secret';
  document.getElementById('modal-name').value='';
  document.getElementById('modal-name').readOnly=false;
  document.getElementById('modal-value').value='';
  document.getElementById('modal-value').type='password';
  document.getElementById('modal-vis-btn').textContent='Show';
  _modalVis=false;
  document.getElementById('modal-err').textContent='';
  document.getElementById('modal-bg').classList.add('show');
  setTimeout(function(){document.getElementById('modal-name').focus();},50);
}
async function openEdit(name){
  _editingName=name;
  document.getElementById('modal-title').textContent='Edit Secret';
  document.getElementById('modal-name').value=name;
  document.getElementById('modal-name').readOnly=true;
  document.getElementById('modal-value').value='';
  document.getElementById('modal-value').type='password';
  document.getElementById('modal-vis-btn').textContent='Show';
  _modalVis=false;
  document.getElementById('modal-err').textContent='';
  document.getElementById('modal-bg').classList.add('show');
  try {
    var r=await fetch('/api/v1/secrets/'+encodeURIComponent(name),{headers:headersAuth()});
    if(r.status===401){closeModal();showLogin('Session expired — sign in again');return;}
    if(r.ok){var d=await r.json();document.getElementById('modal-value').value=d.value||'';}
  } catch(e){document.getElementById('modal-err').textContent='Network error loading secret';}
  setTimeout(function(){document.getElementById('modal-value').focus();},50);
}
function closeModal(){document.getElementById('modal-bg').classList.remove('show');_modalVis=false;}

async function saveSecret(){
  var name=document.getElementById('modal-name').value.trim();
  var value=document.getElementById('modal-value').value;
  var errEl=document.getElementById('modal-err');
  if(!name){errEl.textContent='Name is required';return;}
  try {
    var r=await fetch('/api/v1/secrets/'+encodeURIComponent(name),{method:'PUT',headers:headersJSON(),body:JSON.stringify({value:value})});
    if(r.status===401){closeModal();showLogin('Session expired — sign in again');return;}
    if(!r.ok){errEl.textContent='Save failed ('+r.status+')';return;}
    closeModal();
    refreshTable();
  } catch(e){errEl.textContent='Network error';}
}

async function deleteSecret(name){
  showConfirm('Delete Secret','Delete "'+name+'"? This cannot be undone.',async function(){
    try {
      var r=await fetch('/api/v1/secrets/'+encodeURIComponent(name),{method:'DELETE',headers:headersAuth()});
      if(r.status===401){showLogin('Session expired — sign in again');return;}
      if(r.ok) refreshTable();
    } catch(e){}
  });
}

async function revealSecret(name,btn){
  var valEl=btn.closest('.list-row').querySelector('.sval');
  if(valEl.dataset.revealed==='1'){
    valEl.textContent='••••••••';
    valEl.dataset.revealed='';
    btn.innerHTML='<span class="m-icon" data-lucide="eye"></span> Reveal';
    if(window.lucide) window.lucide.createIcons();
    return;
  }
  try {
    var r=await fetch('/api/v1/secrets/'+encodeURIComponent(name),{headers:headersAuth()});
    if(r.status===401){showLogin('Session expired — sign in again');return;}
    if(!r.ok){return;}
    var d=await r.json();
    valEl.textContent=d.value||'(empty)';
    valEl.dataset.revealed='1';
    btn.innerHTML='<span class="m-icon">👁️</span> Hide';
  } catch(e){}
}

document.getElementById('modal-bg').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
document.getElementById('modal-value').addEventListener('keydown',function(e){if(e.key==='Enter')saveSecret();});
</script>
{{end}}
