{{template "layout" .}}
{{define "content"}}
<div class="container">
  <div class="welcome-section">
    <h2>Welcome to Kompakt</h2>
    <p>Deployment automation for your infrastructure. Manage clients, playbooks, and deployments with ease.</p>
  </div>
  <div id="stats-root"
       hx-get="/ui/partials/home-stats"
       hx-trigger="load, every 15s"
       hx-swap="innerHTML">
    <div class="dashboard-grid">
      <div class="stat-card"><div class="stat-value">…</div><div class="stat-label">Loading…</div></div>
    </div>
  </div>
</div>
{{end}}
{{define "scripts"}}
<style>
  .dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:20px}
  .stat-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:24px;display:flex;flex-direction:column;gap:12px;transition:transform .2s,border-color .2s;text-decoration:none;color:inherit}
  .stat-card:hover{transform:translateY(-2px);border-color:#58a6ff}
  .stat-header{display:flex;align-items:center;gap:12px;color:#8b949e}
  .stat-value{font-size:2rem;font-weight:600;color:#e6edf3}
  .stat-label{font-size:.875rem;color:#8b949e}
  .welcome-section{margin-bottom:32px}
  .welcome-section h2{font-size:1.5rem;font-weight:600;margin-bottom:8px}
  .welcome-section p{color:#8b949e}
</style>
{{end}}
