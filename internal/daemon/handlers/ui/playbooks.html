<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sear - Playbooks</title>
  <link rel="stylesheet" href="/ui/assets/style.css">
</head>
<body>
<div id="pb-modal-bg" class="modal-bg">
  <div class="modal">
    <h3 id="pb-modal-title">Create Playbook</h3>
    <label>Name</label>
    <input id="pb-name" type="text" placeholder="Deploy app" spellcheck="false">
    <label>Description</label>
    <input id="pb-desc" type="text" placeholder="Optional" spellcheck="false">
    <label>Playbook YAML</label>
    <textarea id="pb-yaml" spellcheck="false"></textarea>
    <div class="modal-err" id="pb-modal-err"></div>
    <div class="modal-actions">
      <button onclick="closePBModal()">Cancel</button>
      <button class="btn-add" onclick="savePlaybook()">Save</button>
    </div>
  </div>
</div>
<div id="assign-modal-bg" class="modal-bg">
  <div class="modal" style="max-width:540px">
    <h3>Assign Playbook</h3>
    <label>Playbook</label>
    <input id="assign-pb-name" type="text" readonly>
    <label>Client</label>
    <select id="assign-client"></select>
    <div class="modal-err" id="assign-modal-err"></div>
    <div class="modal-actions">
      <button onclick="closeAssignModal()">Cancel</button>
      <button class="btn-add" onclick="confirmAssign()">Assign</button>
    </div>
  </div>
</div>
<header>
  <div class="header-brand"><h1>&#x26A1; Sear Daemon</h1></div>
  <nav>
    <a href="/ui">Clients</a>
    <a href="/ui/secrets">Secrets</a>
    <a href="/ui/playbooks" class="active">Playbooks</a>
    <a href="/ui/deployments">Deployments</a>
  </nav>
  <div class="header-right"><button onclick="logout()">Sign out</button></div>
</header>
<div class="container">
  <div class="meta">
    <span id="counts">Loading...</span>
    <span class="spacer"></span>
    <button class="btn-add" onclick="openCreate()">+ New Playbook</button>
    <button onclick="load()">Refresh</button>
  </div>
  <div id="root"></div>
</div>
<script src="/ui/assets/layout.js"></script>
<script>
var playbooks=[];
var clients=[];
var editingID='';
var assigningID='';
var templatePlaybookYAML=[
  'name: hello-bash',
  'jobs:',
  '  - name: main',
  '    steps:',
  '      - name: print hello',
  '        shell: bash',
  '        run: echo "hello"',
  ''
].join('\n');



function openCreate(){
  editingID='';
  document.getElementById('pb-modal-title').textContent='Create Playbook';
  document.getElementById('pb-name').value='';
  document.getElementById('pb-desc').value='';
  document.getElementById('pb-yaml').value=templatePlaybookYAML;
  document.getElementById('pb-modal-err').textContent='';
  document.getElementById('pb-modal-bg').classList.add('show');
}
async function openEdit(i){
  var pb=playbooks[i];
  editingID=pb.id;
  document.getElementById('pb-modal-title').textContent='Edit Playbook';
  document.getElementById('pb-name').value=pb.name||'';
  document.getElementById('pb-desc').value=pb.description||'';
  document.getElementById('pb-yaml').value='';
  document.getElementById('pb-modal-err').textContent='';
  document.getElementById('pb-modal-bg').classList.add('show');

  var r=await fetch('/api/v1/playbooks/'+encodeURIComponent(pb.id),{headers:headersAuth()});
  if(r.status===401){closePBModal();showLogin('Session expired - sign in again');return;}
  if(!r.ok){document.getElementById('pb-modal-err').textContent='Failed to load playbook details';return;}
  var full=await r.json();
  document.getElementById('pb-yaml').value=full.playbook_yaml||templatePlaybookYAML;
}
function closePBModal(){document.getElementById('pb-modal-bg').classList.remove('show');}

async function savePlaybook(){
  var errEl=document.getElementById('pb-modal-err');
  var name=document.getElementById('pb-name').value.trim();
  var desc=document.getElementById('pb-desc').value.trim();
  var raw=document.getElementById('pb-yaml').value;
  if(!name){errEl.textContent='Name is required';return;}
  if(!raw.trim()){errEl.textContent='Playbook YAML is required';return;}
  var payload={name:name,description:desc,playbook_yaml:raw};
  var url=editingID?('/api/v1/playbooks/'+encodeURIComponent(editingID)):'/api/v1/playbooks';
  var method=editingID?'PUT':'POST';
  var r=await fetch(url,{method:method,headers:headersJSON(),body:JSON.stringify(payload)});
  if(r.status===401){closePBModal();showLogin('Session expired - sign in again');return;}
  if(!r.ok){
    var msg='Save failed ('+r.status+')';
    try{var d=await r.json();if(d.error)msg=d.error;}catch(_e){}
    errEl.textContent=msg;
    return;
  }
  closePBModal();
  load();
}

async function removePlaybook(i){
  var pb=playbooks[i];
  if(!confirm('Delete playbook "'+(pb.name||pb.id)+'"?'))return;
  var r=await fetch('/api/v1/playbooks/'+encodeURIComponent(pb.id),{method:'DELETE',headers:headersAuth()});
  if(r.status===401){showLogin('Session expired - sign in again');return;}
  if(!r.ok){alert('Delete failed: '+r.status);return;}
  load();
}

function openAssign(i){
  var pb=playbooks[i];
  assigningID=pb.id;
  document.getElementById('assign-pb-name').value=(pb.name||pb.id)+' ('+pb.id+')';
  var sel=document.getElementById('assign-client');
  var options=clients.map(function(c){return '<option value="'+esc(c.id)+'">'+esc((c.hostname||c.id)+' - '+(c.status||'unknown'))+'</option>';}).join('');
  sel.innerHTML=options;
  document.getElementById('assign-modal-err').textContent=clients.length?'':'No clients available';
  document.getElementById('assign-modal-bg').classList.add('show');
}
function closeAssignModal(){document.getElementById('assign-modal-bg').classList.remove('show');}

async function confirmAssign(){
  var errEl=document.getElementById('assign-modal-err');
  var clientID=document.getElementById('assign-client').value;
  if(!clientID){errEl.textContent='Select a client';return;}
  var r=await fetch('/api/v1/playbooks/'+encodeURIComponent(assigningID)+'/assign',{method:'POST',headers:headersJSON(),body:JSON.stringify({client_id:clientID})});
  if(r.status===401){closeAssignModal();showLogin('Session expired - sign in again');return;}
  if(!r.ok){
    var msg='Assign failed ('+r.status+')';
    try{var d=await r.json();if(d.error)msg=d.error;}catch(_e){}
    errEl.textContent=msg;
    return;
  }
  closeAssignModal();
  load();
}

function render(){
  var root=document.getElementById('root');
  document.getElementById('counts').textContent='Playbooks: '+playbooks.length;
  if(!playbooks.length){root.innerHTML='<div class="empty">No playbooks yet.</div>';return;}
  var rows=playbooks.map(function(pb,i){
    var jobs=(pb.playbook && Array.isArray(pb.playbook.jobs))?pb.playbook.jobs.length:0;
    var upd=pb.updated_at?new Date(pb.updated_at).toLocaleString():'-';
    return '<div class="list-row">'+
      '<div class="cell-main"><div class="name">'+esc(pb.name||'-')+'</div><div class="sub mono">'+esc(pb.id||'-')+'</div></div>'+
      '<div><span class="mobile-label">Description</span><span>'+esc(pb.description||'-')+'</span></div>'+
      '<div><span class="mobile-label">Jobs</span><span>'+jobs+'</span></div>'+
      '<div><span class="mobile-label">Updated</span><span>'+esc(upd)+'</span></div>'+
      '<div class="card-top-right"><div class="card-menu">' +
        '<button class="menu-btn" title="Actions">⋮</button>' +
        '<div class="menu-dropdown">' +
          '<button class="menu-item" onclick="openAssign('+i+')">Assign</button>' +
          '<button class="menu-item" onclick="openEdit('+i+')">Edit</button>' +
          '<button class="menu-item danger" onclick="removePlaybook('+i+')">Delete</button>' +
        '</div>' +
      '</div></div>' +
    '</div>';
  }).join('');
  root.innerHTML='<div class="list list-playbooks">'+
    '<div class="list-head"><div>Playbook</div><div>Description</div><div>Jobs</div><div>Updated</div><div></div></div>'+
    rows+
  '</div>';
}

async function load(){
  var p=await fetch('/api/v1/playbooks',{headers:headersAuth()});
  if(p.status===401){showLogin('');return;}
  if(!p.ok){document.getElementById('root').innerHTML='<div class="empty">Failed to load playbooks.</div>';return;}
  var c=await fetch('/api/v1/clients',{headers:headersAuth()});
  clients=c.ok?await c.json():[];
  playbooks=await p.json()||[];
  render();
}

document.getElementById('pb-modal-bg').addEventListener('click',function(e){if(e.target===this)closePBModal();});
document.getElementById('assign-modal-bg').addEventListener('click',function(e){if(e.target===this)closeAssignModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closePBModal();closeAssignModal();}});
initLogin('/api/v1/playbooks', load);
</script>
</body>
</html>
