<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kompakt — Artifacts</title>
  <link rel="stylesheet" href="/ui/assets/style.css">
  <style>html,body{background:#0d1117;color:#e6edf3}</style>
</head>
<body>
<header>
  <div class="header-brand"><h1><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f78166" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:text-bottom;margin-right:4px"><path d="M13 2 L3 14 h9 l-1 8 10-12 h-9 l1-8z"></path></svg> Kompakt</h1> <span class="badge">DASHBOARD</span></div>
  <nav>
    <a href="/ui">Home</a>
    <a href="/ui/clients">Clients</a>
    <a href="/ui/secrets">Secrets</a>
    <a href="/ui/playbooks">Playbooks</a>
    <a href="/ui/deployments">Deployments</a>
    <a href="/ui/artifacts" class="active">Artifacts</a>
  </nav>
  <div class="header-search">
    <input id="f-query" type="text" placeholder="Search artifacts..." autocomplete="off">
    <button id="f-clear" class="btn-clear btn-muted" onclick="clearSearch()" title="Clear search">✕</button>
  </div>
  <div class="header-right"><button onclick="logout()">Sign out</button></div>
</header>
<div class="container">
  <div class="meta">
    <span id="counts">Loading...</span>
    <span class="spacer"></span>
    <button class="btn-add" onclick="showUploadModal()">+ Add artifact</button>
    <button onclick="load()">Refresh</button>
  </div>
  <div id="root"></div>
</div>

<!-- Upload Modal -->
<div id="modal-upload" class="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <h2>Add Artifact</h2>
      <button class="btn-icon" onclick="closeModal('modal-upload')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>File Name (optional)</label>
        <input id="artifact-name" type="text" placeholder="Artifact name (defaults to filename)">
      </div>
      <div class="form-group">
        <label>File</label>
        <input id="artifact-file" type="file">
      </div>
      <div class="form-group">
        <label>Access Policy</label>
        <select id="artifact-policy" onchange="toggleRestrictedUI()">
          <option value="authenticated">Authenticated (all clients)</option>
          <option value="public">Public (unauthenticated)</option>
          <option value="restricted">Restricted (selected clients only)</option>
        </select>
      </div>
      <div id="restricted-ui" class="form-group" style="display:none">
        <label>Allowed Client IDs (comma separated)</label>
        <input id="artifact-clients" type="text" placeholder="client-uuid-1, client-uuid-2">
      </div>
    </div>
    <div class="modal-err" id="upload-modal-err"></div>
    <div class="modal-actions">
        <button class="btn-muted" onclick="closeModal('modal-upload')">Cancel</button>
        <button class="btn-add" onclick="uploadArtifact()">Upload</button>
    </div>
  </div>
</div>

<div id="modal-modify" class="modal-bg">
    <div class="modal">
        <div class="modal-head">
            <h2>Modify Access Policy</h2>
            <button class="btn-icon" onclick="closeModal('modal-modify')">✕</button>
        </div>
        <div class="modal-body">
            <div id="modify-art-name" style="font-weight: 600; margin-bottom: 2px;"></div>
            <div id="modify-art-id" class="sub" style="margin-bottom: 20px; font-family: monospace;"></div>
            
            <div class="form-group">
                <label>Access Policy</label>
                <select id="modify-policy" onchange="toggleModifyRestricted()">
                    <option value="authenticated">Authenticated (Default)</option>
                    <option value="public">Public</option>
                    <option value="restricted">Restricted</option>
                </select>
            </div>

            <div id="modify-restricted-group" class="form-group" style="display:none;">
                <label>Allowed Client IDs (comma separated)</label>
                <input type="text" id="modify-allowed-clients" placeholder="client-1, client-2">
            </div>

            <div id="modify-error" class="modal-err"></div>
        </div>
        <div class="modal-actions">
            <button class="btn-muted" onclick="closeModal('modal-modify')">Cancel</button>
            <button class="btn-add" onclick="savePolicy()">Save Changes</button>
        </div>
    </div>
</div>

<script src="/ui/assets/layout.js"></script>
<script>
var artifacts = [];
var currentPage = 1;
function setPage(n) { currentPage = n; render(); }

function clearSearch() { document.getElementById('f-query').value = ''; currentPage = 1; updateClearBtn(); render(); }
function updateClearBtn() {
  var q = document.getElementById('f-query').value;
  document.getElementById('f-clear').classList.toggle('show', !!q);
}

function filtered() {
  var q = (document.getElementById('f-query').value || '').trim().toLowerCase();
  return artifacts.filter(function(a) {
    var hay = (a.id || '') + ' ' + (a.name || '') + ' ' + (a.filename || '');
    return !q || hay.toLowerCase().indexOf(q) !== -1;
  });
}

function render() {
  var root = document.getElementById('root');
  if (!artifacts.length) {
    root.innerHTML = '<div class="empty">No artifacts found.</div>';
    document.getElementById('counts').textContent = 'Artifacts: 0';
    return;
  }
  var rowsData = filtered();
  document.getElementById('counts').textContent = 'Shown: ' + rowsData.length + ' / ' + artifacts.length;
  if (!rowsData.length) {
    root.innerHTML = '<div class="empty">No artifacts match your search.</div>';
    return;
  }
  var start = (currentPage - 1) * PAGE_SIZE;
  var pageItems = rowsData.slice(start, start + PAGE_SIZE);
  var rows = pageItems.map(function(a) {
    var size = (a.size / 1024).toFixed(1) + ' KB';
    if (a.size > 1024 * 1024) size = (a.size / (1024 * 1024)).toFixed(1) + ' MB';
    var upd = a.uploaded_at ? new Date(a.uploaded_at).toLocaleString() : '-';
    var policy = a.access_policy || 'authenticated';
    var policyLabel = '<span class="badge badge-muted">Authenticated</span>';
    if (policy === 'public') policyLabel = '<span class="badge badge-outline">Public</span>';
    if (policy === 'restricted') policyLabel = '<span class="badge badge-warning" title="' + esc(a.allowed_clients ? a.allowed_clients.join(', ') : '') + '">Restricted</span>';

    return '<div class="list-row">' +
      '<div class="cell-main"><div>' + esc(a.name) + '</div><div class="mono">' + esc(a.id) + '</div></div>' +
      '<div class="mono">' + esc(a.filename) + '</div>' +
      '<div>' + esc(size) + '</div>' +
      '<div>' + policyLabel + '</div>' +
      '<div>' + esc(upd) + '</div>' +
      '<div class="card-top-right"><div class="card-menu">' +
        '<button class="menu-btn" title="Actions">⋮</button>' +
        '<div class="menu-dropdown">' +
          '<a class="menu-item" href="/artifacts/' + encodeURIComponent(a.id) + '" download="' + esc(a.filename) + '"><span class="m-icon" data-lucide="download"></span> Download</a>' +
          '<button class="menu-item" onclick="modifyPolicy(\'' + esc(a.id) + '\', \'' + esc(a.name) + '\', \'' + esc(policy) + '\', \'' + esc(a.allowed_clients ? a.allowed_clients.join(',') : '') + '\')"><span class="m-icon" data-lucide="shield"></span> Modify Policy</button>' +
          '<button class="menu-item" onclick="removeArtifact(\'' + esc(a.id) + '\')"><span class="m-icon" data-lucide="trash-2"></span> Remove</button>' +
        '</div>' +
      '</div></div>' +
    '</div>';
  }).join('');

  root.innerHTML = '<div class="list list-artifacts">' +
    '<div class="list-head"><div>Artifact</div><div>Filename</div><div>Size</div><div>Access Policy</div><div>Uploaded</div><div></div></div>' +
    rows +
    '</div>' + buildPagination(rowsData.length, currentPage);

  updateIcons();
}

async function load() {
  document.getElementById('root').innerHTML = '<div class="spinner"></div>';
  try {
    var r = await fetch('/artifacts', { headers: headersAuth() });
    if (r.status === 401) { showLogin(''); return; }
    if (!r.ok) { document.getElementById('root').innerHTML = '<div class="empty">Failed to load artifacts.</div>'; return; }
    artifacts = await r.json() || [];
    artifacts.sort((a, b) => new Date(b.uploaded_at || 0) - new Date(a.uploaded_at || 0));
    render();
    updateClearBtn();
  } catch(e) {
    document.getElementById('root').innerHTML = '<div class="empty">Network error. Retrying&#x2026;</div>';
  }
}

function showModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function showUploadModal() {
  document.getElementById('artifact-name').value = '';
  document.getElementById('artifact-file').value = '';
  document.getElementById('artifact-policy').value = 'authenticated';
  document.getElementById('artifact-clients').value = '';
  document.getElementById('restricted-ui').style.display = 'none';
  showModal('modal-upload');
}

function toggleRestrictedUI() {
  var policy = document.getElementById('artifact-policy').value;
  document.getElementById('restricted-ui').style.display = (policy === 'restricted' ? 'block' : 'none');
}

function toggleModifyRestricted() {
    var policy = document.getElementById('modify-policy').value;
    document.getElementById('modify-restricted-group').style.display = (policy === 'restricted' ? 'block' : 'none');
}

function modifyPolicy(id, name, policy, allowedClients) {
    document.getElementById('modify-art-name').innerText = name;
    document.getElementById('modify-art-id').innerText = id;
    document.getElementById('modify-policy').value = policy;
    document.getElementById('modify-allowed-clients').value = allowedClients || '';
    toggleModifyRestricted();
    document.getElementById('modify-error').innerText = '';
    showModal('modal-modify');
    window.currentModifyId = id;
}

async function savePolicy() {
    var id = window.currentModifyId;
    var policy = document.getElementById('modify-policy').value;
    var clients = document.getElementById('modify-allowed-clients').value;
    var err = document.getElementById('modify-error');

    try {
        var url = '/artifacts/' + id + '?access_policy=' + encodeURIComponent(policy) + '&allowed_clients=' + encodeURIComponent(clients);
        var res = await fetch(url, { 
            method: 'PATCH',
            headers: headersAuth()
        });
        if (!res.ok) {
            var data = await res.json();
            throw new Error(data.error || 'Failed to update policy');
        }
        closeModal('modal-modify');
        load();
    } catch (e) {
        err.innerText = e.message;
    }
}

async function uploadArtifact() {
  var errEl = document.getElementById('upload-modal-err');
  var fileInput = document.getElementById('artifact-file');
  if (!fileInput.files.length) { errEl.textContent = 'Please select a file'; return; }
  var file = fileInput.files[0];
  var name = document.getElementById('artifact-name').value.trim();
  var filename = file.name;

  try {
    var policy = document.getElementById('artifact-policy').value;
    var clients = document.getElementById('artifact-clients').value.trim();

    var params = '?filename=' + encodeURIComponent(filename);
    if (name) params += '&name=' + encodeURIComponent(name);
    params += '&access_policy=' + encodeURIComponent(policy);
    if (policy === 'restricted' && clients) {
        params += '&allowed_clients=' + encodeURIComponent(clients);
    }

    var r = await fetch('/artifacts' + params, {
      method: 'POST',
      headers: headersAuth(),
      body: file
    });
    if (r.status === 401) { showLogin('Session expired — sign in again'); return; }
    if (!r.ok) { errEl.textContent = 'Upload failed (' + r.status + ')'; return; }
    closeModal('modal-upload');
    load();
  } catch (e) {
    errEl.textContent = 'Network error: ' + e.message;
  }
}

async function removeArtifact(id) {
  showConfirm('Delete Artifact', 'Delete this artifact? This cannot be undone.', async function() {
    try {
      var r = await fetch('/artifacts/' + encodeURIComponent(id), { method: 'DELETE', headers: headersAuth() });
      if (r.status === 401) { showLogin('Session expired — sign in again'); return; }
      if (!r.ok) { document.getElementById('counts').textContent = 'Delete failed (' + r.status + ')'; return; }
      load();
    } catch(e) {
      document.getElementById('counts').textContent = 'Network error';
    }
  });
}

document.getElementById('f-query').addEventListener('input', function() { currentPage = 1; render(); updateClearBtn(); });
initLogin('/api/v1/status', load);
</script>
</body>
</html>
