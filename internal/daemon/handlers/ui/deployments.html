<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kompakt — Deployments</title>
  <link rel="stylesheet" href="/ui/assets/style.css">
  <style>html,body{background:#0d1117;color:#e6edf3}</style>
</head>
<body>
<header>
  <div class="header-brand"><h1><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f78166" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:text-bottom;margin-right:4px"><path d="M13 2 L3 14 h9 l-1 8 10-12 h-9 l1-8z"></path></svg> Kompakt</h1> <span class="badge">DASHBOARD</span></div>
  <nav>
    <a href="/ui">Home</a>
    <a href="/ui/clients">Clients</a>
    <a href="/ui/secrets">Secrets</a>
    <a href="/ui/playbooks">Playbooks</a>
    <a href="/ui/deployments" class="active">Deployments</a>
    <a href="/ui/artifacts">Artifacts</a>
  </nav>
  <div class="header-search">
    <input id="f-query" type="text" placeholder="Search deployment, client, playbook" autocomplete="off">
    <button id="f-clear" class="btn-clear btn-muted" onclick="clearFilters()" title="Clear search">✕</button>
  </div>
  <div class="header-right"><button onclick="logout()">Sign out</button></div>
</header>
<div class="container">
  <div class="meta">
    <span id="counts">Loading...</span>
    <span class="spacer"></span>
    <button onclick="load()">Refresh</button>
  </div>
  <div class="filters" style="display:none"></div>
  <div id="root"></div>
  <div id="logs-panel" class="panel" style="display:none">
    <div class="panel-head">
      <span id="logs-title">Logs</span>
      <button onclick="closeLogs()">Close</button>
    </div>
    <div id="logs-root" class="log-list"></div>
  </div>
</div>
<script src="/ui/assets/layout.js"></script>
<script>
var deployments=[];

function clearFilters(){document.getElementById('f-query').value='';updateClearBtn();render();}

function filtered(){
  var q=(document.getElementById('f-query').value||'').trim().toLowerCase();
  return deployments.filter(function(d){
    var hay=(d.id||'')+' '+(d.client_id||'')+' '+(d.playbook_id||'');
    if(q && hay.toLowerCase().indexOf(q)===-1) return false;
    return true;
  });
}

function statusClass(s) {
  switch((s||'').toLowerCase()) {
    case 'done': return 'success';
    case 'failed': return 'warning';
    case 'running': return 'success';
    case 'rebooting': return 'warning';
    default: return 'muted';
  }
}

function render(){
  var root=document.getElementById('root');
  if(!deployments.length){root.innerHTML='<div class="empty">No deployments yet.</div>';document.getElementById('counts').textContent='Deployments: 0';return;}
  var rowsData=filtered();
  document.getElementById('counts').textContent='Shown: '+rowsData.length+' / '+deployments.length;
  if(!rowsData.length){root.innerHTML='<div class="empty">No deployments match your filters.</div>';return;}
  var rows=rowsData.map(function(d,i){
    var upd=d.updated_at?new Date(d.updated_at).toLocaleString():'-';
    var finished=d.finished_at?new Date(d.finished_at).toLocaleString():'-';
    return '<div class="list-row">'+
      '<div><div class="sub mono">' + esc(d.id || '-') + '</div><div class="sub mono" style="font-size:10px">Step: ' + (d.resume_step_index||0) + '</div></div>'+
      '<div class="cell-main"><div>' + esc(d.hostname || '-') + '</div><div class="sub mono">' + esc(d.client_id || '-') + '</div></div>'+
      '<div class="cell-main"><div>' + esc(d.playbook_name || '-') + '</div><div class="sub mono">' + esc(d.playbook_id || '-') + '</div></div>'+
      '<div><span class="badge badge-'+statusClass(d.status)+'">'+esc(d.status)+'</span></div>'+
      '<div>'+upd+'</div>'+
      '<div>'+finished+'</div>'+
      '<div class="card-top-right"><div class="card-menu">' +
        '<button class="menu-btn" title="Actions">⋮</button>' +
        '<div class="menu-dropdown">' +
          '<button class="menu-item" onclick="openLogs(\''+esc(d.id)+'\')"><span class="m-icon" data-lucide="file-text"></span> View Logs</button>'+
          '<button class="menu-item" onclick="removeDeployment(\''+esc(d.id)+'\')"><span class="m-icon" data-lucide="trash-2"></span> Remove Deployment</button>'+
        '</div>'+
      '</div></div>'+
    '</div>';
  }).join('');
  root.innerHTML='<div class="list list-deployments">'+
    '<div class="list-head"><div>Deployment</div><div>Client</div><div>Playbook</div><div>Status</div><div>Updated</div><div>Finished</div><div></div></div>'+
    rows+
  '</div>';
  updateIcons();
}

async function removeDeployment(id) {
  if (!confirm('Remove deployment "' + id + '"?\nThis will remove it from state and delete its logs.')) return;
  try {
    const r = await fetch('/api/v1/deployments/' + encodeURIComponent(id), { method: 'DELETE', headers: headersAuth() });
    if (r.status === 401) { showLogin('Session expired — sign in again'); return; }
    if (!r.ok) { document.getElementById('counts').textContent = 'Delete failed (' + r.status + ')'; return; }
    load();
  } catch(e) {
    document.getElementById('counts').textContent = 'Network error';
  }
}

async function openLogs(id){
  var p=document.getElementById('logs-panel');
  var root=document.getElementById('logs-root');
  document.getElementById('logs-title').textContent='Logs: '+id;
  p.style.display='block';
  root.innerHTML='<div class="empty">Loading logs...</div>';
  var r=await fetch('/api/v1/deployments/'+encodeURIComponent(id)+'/logs',{headers:headersAuth()});
  if(r.status===401){showLogin('Session expired - sign in again');return;}
  if(!r.ok){root.innerHTML='<div class="empty">Failed to load logs.</div>';return;}
  var logs=await r.json()||[];
  if(!logs.length){root.innerHTML='<div class="empty">No logs for this deployment.</div>';return;}
  var stepNameByKey={};
  logs.forEach(function(l){
    var m=String(l.message||'').match(/^\[(.+?) \/ (.+?)\] (starting|completed)$/);
    if(m){
      var k=String(l.job_name||m[1]||'')+'|'+String(l.step_index||0);
      stepNameByKey[k]=m[2]||'';
    }
  });
  var rows=logs.map(function(l){
    var ts=l.timestamp?new Date(l.timestamp).toLocaleString():'-';
    var hasStep=!!String(l.job_name||'').trim();
    var job=hasStep?String(l.job_name):'-';
    var step='-';
    if(hasStep){
      var key=job+'|'+String(l.step_index||0);
      step=stepNameByKey[key]||'-';
    }
    return '<div class="log-row">'+
      '<div class="ts">'+esc(ts)+'</div>'+
      '<div>'+esc(l.level||'-')+'</div>'+
      '<div>'+esc(job)+'</div>'+
      '<div>'+esc(step)+'</div>'+
      '<div class="msg">'+esc(l.message||'')+'</div>'+
    '</div>';
  }).join('');
  root.innerHTML='<div class="log-head"><div>Time</div><div>Level</div><div>Job</div><div>Step</div><div>Message</div></div>'+rows;
}
function closeLogs(){document.getElementById('logs-panel').style.display='none';}

async function load(){
  try {
    var r=await fetch('/api/v1/deployments',{headers:headersAuth()});
    if(r.status===401){showLogin('');return;}
    if(!r.ok){document.getElementById('root').innerHTML='<div class="empty">Failed to load deployments.</div>';return;}
    deployments=await r.json()||[];
    deployments.sort(function(a,b){return new Date(b.updated_at||0)-new Date(a.updated_at||0);});
    render();
    updateClearBtn();
  } catch(e) {
    document.getElementById('root').innerHTML='<div class="empty">Network error. Retrying&#x2026;</div>';
  }
}
function updateClearBtn() {
  var q = document.getElementById('f-query').value;
  document.getElementById('f-clear').classList.toggle('show', !!q);
}

document.getElementById('f-query').addEventListener('input',function(){render();updateClearBtn();});

var _autoRefreshTimer = null;
function startAutoRefresh() { _autoRefreshTimer = setInterval(load, 10000); }
function stopAutoRefresh() { clearInterval(_autoRefreshTimer); _autoRefreshTimer = null; }
document.addEventListener('visibilitychange', function() {
  if (document.hidden) { stopAutoRefresh(); } else { load(); startAutoRefresh(); }
});

initLogin('/api/v1/deployments', load);
startAutoRefresh();
</script>
</body>
</html>
