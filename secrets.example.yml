# sear-daemon secrets file (secrets.yml)
# This file contains sensitive data.  Protect it with file-system permissions
# (chmod 600) and do not commit it to source control.

# Root password for admin API access (/status, /admin/*, /artifacts, /secrets).
# If omitted, a random password is generated and printed to the daemon console
# on every startup.
root_password: "change-me-in-production"

# Registration secrets: clients must present one of these values during
# registration.  Map of secret-name → secret-value.
# Supports extensible providers: baremetal serial numbers, cloud instance IDs, etc.
registration_secrets:
  baremetal-prod: "your-baremetal-secret-here"
  # azure-eastus:   "azure-instance-specific-secret"
  # aws-us-east-1:  "aws-instance-specific-secret"
  # gcp-us-central: "gcp-instance-specific-secret"

# Client secrets are injected as environment variables into every playbook step.
# Use these to pass credentials, tokens, or other sensitive values to clients.
client_secrets:
  DATABASE_PASSWORD: "db-secret"
  API_TOKEN: "my-api-token"
  # Add as many key/value pairs as needed.
